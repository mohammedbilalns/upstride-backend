services:
  redis:
    image: redis:7-alpine
    container_name: upstride-redis-dev
    ports:
      - "6380:6379"
    volumes:
      - redis_data_dev:/data
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: upstride-backend-dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./.env:/app/.env
    command: pnpm run dev
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data_dev:
