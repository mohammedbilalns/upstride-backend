<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .wrapper {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }

        .header {
            background-color: #7c3aed;
            padding: 32px;
            text-align: center;
        }

        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .content {
            padding: 40px 32px;
        }

        .footer {
            padding: 24px;
            text-align: center;
            background-color: #f1f5f9;
            color: #64748b;
            font-size: 13px;
        }

        .otp-container {
            background-color: #f8fafc;
            border: 2px dashed #7c3aed;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin: 24px 0;
        }

        .otp-code {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 0.25em;
            color: #7c3aed;
            font-family: monospace;
        }

        .button {
            display: inline-block;
            background-color: #7c3aed;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 16px;
        }

        p {
            margin-bottom: 16px;
        }

        strong {
            color: #0f172a;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="header">
            <h1>UpStride</h1>
        </div>
        <div class="content">
            {{content}}
        </div>
        <div class="footer">
            <p>&copy; 2024 UpStride. All rights reserved.</p>
            <p>If you didn't request this email, you can safely ignore it.</p>
        </div>
    </div>
</body>

</html>
